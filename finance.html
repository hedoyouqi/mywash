<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마이 데일리 대시보드 (개인화 최종본)</title>

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 255, 255, 0.8);
            --text-main: #2d3436;
            --text-sub: #636e72;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --accent: #6c5ce7;
            --up-bg: rgba(255, 118, 117, 0.15);
            --up-text: #d63031;
            --down-bg: rgba(116, 185, 255, 0.15);
            --down-text: #0984e3;
            --ball-y: #fbc531; --ball-b: #0984e3; --ball-r: #e84118; --ball-g: #7f8fa6; --ball-gn: #4cd137;
        }

        body.dark {
            --bg-gradient: linear-gradient(160deg, #1e272e, #11151a);
            --card-bg: rgba(30, 39, 46, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #dfe6e9;
            --text-sub: #b2bec3;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --accent: #a29bfe;
            --up-bg: rgba(255, 118, 117, 0.2);
            --up-text: #ff7675;
            --down-bg: rgba(116, 185, 255, 0.2);
            --down-text: #74b9ff;
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }

        body {
            margin: 0; background: var(--bg-gradient); background-attachment: fixed;
            color: var(--text-main); font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh; transition: background 0.5s ease;
        }

        .time, .coin-price, .lotto-ball, .ip { font-family: 'Rajdhani', sans-serif; }

        .container { max-width: 520px; margin: auto; padding: 20px 16px 60px; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 0 4px; }
        .ip { font-size: 14px; color: var(--text-sub); font-weight: 600; background: var(--card-bg); padding: 6px 12px; border-radius: 20px; backdrop-filter: blur(4px); }
        .mode-btn { background: var(--card-bg); border: 1px solid var(--card-border); width: 42px; height: 42px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px; padding: 24px; margin-bottom: 24px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: var(--shadow); transition: transform 0.3s ease; }
        .card-header { text-align: center; margin-bottom: 20px; font-size: 18px; font-weight: 700; color: var(--text-main); opacity: 0.9; }

        .time-section { text-align: center; }
        .date-badge { display: inline-block; font-size: 14px; color: var(--accent); background: rgba(108, 92, 231, 0.15); padding: 4px 12px; border-radius: 12px; margin-bottom: 8px; font-weight: 700; }
        .time-display { font-size: 56px; font-weight: 700; line-height: 1; background: linear-gradient(to right, var(--text-main), var(--text-sub)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }

        .lotto-wrap { display: flex; flex-direction: column; gap: 10px; }
        .lotto-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 12px; }
        .lotto-ball { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3); box-shadow: inset -2px -2px 6px rgba(0,0,0,0.2); }

        .coin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .coin-item { display: flex; flex-direction: column; align-items: center; padding: 12px 8px; border-radius: 16px; transition: background 0.3s; }
        .coin-item.up { background: var(--up-bg); }
        .coin-item.down { background: var(--down-bg); }
        .coin-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
        .coin-price { font-size: 16px; font-weight: 600; }
        .coin-change { font-size: 12px; margin-top: 2px; font-weight: 700; }
        .up .coin-price, .up .coin-change { color: var(--up-text); }
        .down .coin-price, .down .coin-change { color: var(--down-text); }

        @media(min-width: 600px) { .container { max-width: 800px; } .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; } .full-width { grid-column: span 2; } }
    </style>
</head>

<body>
<div class="container">
    <div class="top-bar">
        <div class="ip" id="ip">IP 확인중...</div>
        <button class="mode-btn" id="modeBtn" onclick="toggleMode()">🌙</button>
    </div>

    <div class="grid-layout">
        <div class="card full-width time-section">
            <div class="date-badge" id="date"></div>
            <div class="time-display time" id="time">00:00:00</div>
            <div style="font-size:13px; color:var(--text-sub);">SEOUL, KOREA</div>
        </div>

        <div class="card">
            <div class="card-header">🍀 나만의 행운 번호</div>
            <div class="lotto-wrap" id="lotto"></div>
        </div>

        <div class="card">
            <div class="card-header">🔥 실시간 시세 (KRW)</div>
            <div id="coin" class="coin-grid"></div>
        </div>
    </div>
</div>

<script>
    /* --- 1. 다크모드 --- */
    function toggleMode(){
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        document.getElementById('modeBtn').innerText = isDark ? '☀️' : '🌙';
    }

    /* --- 2. 보안 설정 --- */
    document.addEventListener('contextmenu', e => e.preventDefault());

    /* --- 3. IP 가져오기 --- */
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(d => document.getElementById('ip').innerText = d.ip)
        .catch(() => document.getElementById('ip').innerText = 'IP 숨김');

    /* --- 4. 시간 업데이트 --- */
    function updateTime(){
        const now = new Date();
        const dateStr = new Intl.DateTimeFormat('ko-KR', { timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'long' }).format(now);
        const timeStr = new Intl.DateTimeFormat('ko-KR', { timeZone: 'Asia/Seoul', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(now);
        document.getElementById('date').innerText = dateStr;
        document.getElementById('time').innerText = timeStr;
    }
    setInterval(updateTime, 1000);
    updateTime();

    /* --- 5. 개인화 로또 로직 --- */
    function getBallColor(num) {
        if (num <= 10) return 'var(--ball-y)';
        if (num <= 20) return 'var(--ball-b)';
        if (num <= 30) return 'var(--ball-r)';
        if (num <= 40) return 'var(--ball-g)';
        return 'var(--ball-gn)';
    }

    function getKSTDateKey(){
        const now = new Date();
        const fmt = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit' });
        return fmt.format(now);
    }

    function getOrCreateUserGuid() {
        let guid = localStorage.getItem('user_guid');
        if (!guid) {
            guid = 'u-' + Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
            localStorage.setItem('user_guid', guid);
        }
        return guid;
    }

    function seededRandom(seed){
        let x = Math.sin(seed) * 10000;
        return x - Math.floor(x);
    }

    function generateDailyLotto(){
        const dateKey = getKSTDateKey();
        const saved = localStorage.getItem('lotto-' + dateKey);
        if(saved) return JSON.parse(saved);

        const guid = getOrCreateUserGuid();
        // 날짜와 기기ID를 섞어 고유 시드 생성
        let combined = dateKey + guid;
        let seed = 0;
        for (let i = 0; i < combined.length; i++) {
            seed = (seed << 5) - seed + combined.charCodeAt(i);
            seed |= 0;
        }
        seed = Math.abs(seed);

        let result = [];
        for(let i=0; i<5; i++){
            let nums = [];
            while(nums.length < 6){
                let n = Math.floor(seededRandom(seed++) * 45) + 1;
                if(!nums.includes(n)) nums.push(n);
            }
            nums.sort((a,b) => a-b);
            result.push(nums);
        }
        localStorage.setItem('lotto-' + dateKey, JSON.stringify(result));
        return result;
    }

    function renderLotto(){
        const container = document.getElementById('lotto');
        container.innerHTML = '';
        const numbers = generateDailyLotto();
        numbers.forEach(line => {
            const row = document.createElement('div');
            row.className = 'lotto-row';
            line.forEach(n => {
                const ball = document.createElement('div');
                ball.className = 'lotto-ball';
                ball.innerText = n;
                ball.style.backgroundColor = getBallColor(n);
                row.appendChild(ball);
            });
            container.appendChild(row);
        });
    }
    renderLotto();

    /* --- 6. 코인 업데이트 --- */
    async function coinUpdate(){
        try {
            const r = await fetch('https://api.upbit.com/v1/ticker?markets=KRW-BTC,KRW-ETH,KRW-XRP,KRW-SOL,KRW-DOGE,KRW-XLM');
            const data = await r.json();
            const container = document.getElementById('coin');
            container.innerHTML = '';
            data.forEach(c => {
                const price = c.trade_price.toLocaleString();
                const rate = (c.signed_change_rate * 100).toFixed(2);
                const isUp = c.signed_change_rate >= 0;
                const item = document.createElement('div');
                item.className = `coin-item ${isUp ? 'up' : 'down'}`;
                const symbol = c.market.replace('KRW-', '');
                item.innerHTML = `
                    <div class="coin-name">${symbol}</div>
                    <div class="coin-price">${price}</div>
                    <div class="coin-change">${isUp ? '▲' : '▼'} ${rate}%</div>
                `;
                container.appendChild(item);
            });
        } catch(e) { console.error("코인 로딩 실패"); }
    }
    setInterval(coinUpdate, 2000);
    coinUpdate();
</script>
</body>
</html>
