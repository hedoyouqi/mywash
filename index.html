<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세차 대시보드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #111;
            --accent-color: #007aff;
            --input-bg: #eff2f5;
            --clock-gradient: linear-gradient(135deg, #111 0%, #555 50%, #222 100%);
        }

        [data-theme="dark"] {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #0a84ff;
            --input-bg: #2a2a2a;
            --clock-gradient: linear-gradient(135deg, #ffffff 0%, #aaa 50%, #eee 100%);
        }

        /* ✨ 보안: 텍스트 선택 및 길게 터치(컨텍스트 메뉴) 방지 ✨ */
        * {
            -webkit-user-select: none;  /* iOS Safari */
            -ms-user-select: none;      /* Internet Explorer/Edge */
            user-select: none;          /* Non-prefixed version, currently supported by Chrome, Opera and Firefox */
            -webkit-touch-callout: none; /* iOS Safari 길게 터치 메뉴 방지 */
        }

        /* 입력창은 사용자가 숫자를 넣어야 하므로 예외 처리 */
        input {
            -webkit-user-select: auto !important;
            user-select: auto !important;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            font-weight: 800; 
            transition: all 0.3s ease;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { 
            width: 100%; 
            max-width: 850px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
        }

        .user-info {
            font-size: 0.9rem;
            font-weight: 900;
            color: var(--accent-color);
            background: var(--input-bg);
            padding: 8px 15px;
            border-radius: 10px;
        }

        .theme-toggle { cursor: pointer; font-size: 1.8rem; background: none; border: none; color: var(--text-color); padding: 10px; }
        
        .clock-section { text-align: center; margin-bottom: 50px; }
        #clock-wrapper { display: flex; align-items: baseline; justify-content: center; gap: 15px; }
        #ampm { font-size: 2.5rem; font-weight: 900; opacity: 0.6; }

        #clock { 
            font-size: 6.5rem; 
            font-weight: 900; 
            letter-spacing: -5px; 
            line-height: 1;
            display: flex;
        }

        .time-main {
            background: var(--clock-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #seconds {
            background: var(--clock-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.3s ease;
        }

        #date { font-size: 1.5rem; font-weight: 700; opacity: 0.8; margin-top: 10px; }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
            width: 100%;
            max-width: 850px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 35px;
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h2 { 
            margin-top: 0; 
            font-size: 1.4rem; 
            font-weight: 900;
            color: var(--accent-color);
            margin-bottom: 25px; 
            display: inline-block;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 5px;
        }

        .weather-info div { 
            margin: 18px 0; 
            font-size: 1.2rem; 
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(128,128,128,0.1);
            padding-bottom: 10px;
        }

        .calc-wrapper { display: flex; flex-direction: column; gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .input-group label { font-size: 1.1rem; font-weight: 800; }

        .input-field {
            width: 100%;
            box-sizing: border-box;
            padding: 18px;
            border: 3px solid transparent;
            border-radius: 18px;
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 1.5rem;
            font-weight: 900;
            text-align: right;
        }

        .liter-hint { font-size: 0.9rem; color: var(--accent-color); text-align: right; margin-top: -5px; font-weight: 700; }

        .result-display {
            margin-top: 15px;
            padding: 30px;
            background: var(--accent-color);
            color: white;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.3);
        }

        .result-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; opacity: 0.9; }
        .result-amount { font-size: 3.5rem; font-weight: 900; letter-spacing: -1px; }
        .result-amount span { font-size: 1.3rem; margin-left: 5px; opacity: 0.8; }

        @media (max-width: 800px) {
            .main-content { grid-template-columns: 1fr; }
            #clock { font-size: 4.5rem; }
        }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <header>
        <div class="user-info">접속 IP: <span id="user-ip">불러오는 중...</span></div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <section class="clock-section">
        <div id="clock-wrapper">
            <span id="ampm">오전</span>
            <div id="clock">
                <span id="time-hm" class="time-main">00:00:</span>
                <span id="seconds">00</span>
            </div>
        </div>
        <div id="date">오늘 날짜</div>
    </section>

    <main class="main-content">
        <div class="card">
            <h2>현재 위치 날씨</h2>
            <div class="weather-info">
                <div><span>📍 현재 위치</span><span id="location" style="text-align: right;">위치 찾는 중...</span></div>
                <div><span>🌡️ 현재 온도</span><span id="temp">22</span>°C</div>
                <div><span>💧 현재 습도</span><span id="humidity">45</span>%</div>
                <div><span>🌱 이슬점</span><span id="dewpoint">12</span>°C</div>
            </div>
        </div>

        <div class="card">
            <h2>케미컬 계산기</h2>
            <div class="calc-wrapper">
                <div class="input-group">
                    <label>약품 비율 (1 : X)</label>
                    <input type="number" id="ratio" class="input-field" value="50" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>사용할 물 양 (ml)</label>
                    <input type="number" id="water" class="input-field" value="1000" oninput="calculate()">
                    <div id="literHint" class="liter-hint">(= 1.0 리터)</div>
                </div>

                <div class="result-display">
                    <div class="result-title">필요한 약품 양</div>
                    <div class="result-amount" id="chemOut">20<span>ml</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 우클릭 방지 자바스크립트 추가
        document.addEventListener('contextmenu', event => event.preventDefault());

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('user-ip').textContent = data.ip;
            } catch (error) { document.getElementById('user-ip').textContent = "연결 오류"; }
        }
        getIP();

        async function getAddress(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`, {
                    headers: { 'Accept-Language': 'ko' }
                });
                const data = await response.json();
                const addr = data.address;
                const city = addr.city || addr.town || addr.village || addr.county || "알 수 없음";
                const province = addr.province || addr.city_district || "";
                document.getElementById('location').textContent = `${province} ${city}`.trim();
            } catch (error) { document.getElementById('location').textContent = "지역명 탐색 실패"; }
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => getAddress(p.coords.latitude, p.coords.longitude), 
                () => document.getElementById('location').textContent = "위치 권한 거부됨");
            }
        }
        getLocation();

        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const secondsVal = now.getSeconds();
            const secondsStr = String(secondsVal).padStart(2, '0');
            
            document.getElementById('ampm').textContent = hours >= 12 ? '오후' : '오전';
            hours = hours % 12 || 12; 

            document.getElementById('time-hm').textContent = `${hours}:${minutes}:`;
            
            const secElem = document.getElementById('seconds');
            secElem.textContent = secondsStr;

            if (secondsVal >= 50) {
                const redness = Math.floor((secondsVal - 49) * 25.5); 
                secElem.style.webkitTextFillColor = `rgb(${redness}, 0, 0)`;
                secElem.style.background = 'none';
            } else {
                secElem.style.webkitTextFillColor = 'transparent';
                secElem.style.background = 'var(--clock-gradient)';
                secElem.style.webkitBackgroundClip = 'text';
            }

            document.getElementById('date').textContent = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }
        setInterval(updateTime, 1000); updateTime();

        function toggleTheme() {
            const b = document.body;
            b.hasAttribute('data-theme') ? b.removeAttribute('data-theme') : b.setAttribute('data-theme', 'dark');
        }

        function calculate() {
            const r = parseFloat(document.getElementById('ratio').value) || 0;
            const w = parseFloat(document.getElementById('water').value) || 0;
            const hint = document.getElementById('literHint');
            if (w > 0) hint.textContent = `(= ${(w/1000).toFixed(1).replace('.0','')} 리터)`;
            const res = r > 0 && w > 0 ? (w / r).toFixed(1).replace('.0','') : '0';
            document.getElementById('chemOut').innerHTML = res + '<span>ml</span>';
        }
        calculate();
    </script>
</body>
</html>
