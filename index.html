<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windy 기반 세차 대시보드</title>
    <style>
        @font-face {
            font-family: 'MyCustomFont';
            src: url('./Aabubble.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        :root {
            --bg-color: #f0f3f5;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --accent-color: #007aff;
            --gas-premium: #FF2D55;
            --gas-gasoline: #FF9500;
            --gas-diesel: #34C759;
            --input-bg: #f8f9fa;
            --clock-gradient: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0a;
            --card-bg: #1c1c1e;
            --text-color: #f5f5f7;
            --accent-color: #0a84ff;
            --input-bg: #2c2c2e;
            --clock-gradient: linear-gradient(135deg, #ffffff 0%, #d1d1d6 100%);
        }

        * {
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
            overscroll-behavior-y: contain; -webkit-font-smoothing: antialiased;
            font-family: 'MyCustomFont', -apple-system, sans-serif !important;
        }

        input { -webkit-user-select: auto !important; user-select: auto !important; }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-y: auto;
        }

        header { width: 100%; max-width: 850px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { font-size: 0.8rem; color: #999; opacity: 0.8; }
        .theme-toggle { cursor: pointer; font-size: 1.6rem; background: none; border: none; color: var(--text-color); padding: 10px; opacity: 0.7; }
        
        .clock-section { text-align: center; margin-bottom: 40px; }
        #clock-wrapper { display: flex; align-items: baseline; justify-content: center; gap: 12px; }
        #ampm { font-size: 2.2rem; opacity: 0.4; }
        #clock { font-size: 6rem; letter-spacing: -2px; line-height: 1; display: flex; }
        .time-main, #seconds { background: var(--clock-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        #date { font-size: 1.4rem; opacity: 0.5; margin-top: 12px; }

        .main-content { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; width: 100%; max-width: 850px; }

        .card { 
            position: relative; background-color: var(--card-bg); 
            padding: 30px; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
        }

        .update-area {
            position: absolute; top: 30px; right: 25px;
            display: flex; align-items: center; gap: 8px;
        }
        .update-time { font-size: 0.75rem; color: #bbb; }
        .refresh-btn {
            background: none; border: none; font-size: 1.1rem; cursor: pointer;
            color: var(--accent-color); padding: 5px; opacity: 0.8;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
        }
        .refreshing { animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h2 { margin-top: 0; font-size: 1.3rem; color: var(--accent-color); margin-bottom: 20px; opacity: 0.9; }

        .weather-info div { 
            margin: 15px 0; font-size: 1.2rem; display: flex; 
            justify-content: space-between; border-bottom: 1px solid rgba(128,128,128,0.05); padding-bottom: 12px; 
        }

        .gas-price-box { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .gas-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; border-radius: 20px; background: var(--input-bg);
            border-left: 6px solid #ddd;
        }
        .gas-item.premium { border-left-color: var(--gas-premium); }
        .gas-item.gasoline { border-left-color: var(--gas-gasoline); }
        .gas-item.diesel { border-left-color: var(--gas-diesel); }
        .gas-label { font-weight: bold; font-size: 1.1rem; }
        .gas-val { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; }
        .text-premium { color: var(--gas-premium); }
        .text-gasoline { color: var(--gas-gasoline); }
        .text-diesel { color: var(--gas-diesel); }

        .gas-btn-now {
            width: 100%; margin-top: 15px; padding: 18px; border-radius: 20px; border: none;
            background: #222; color: #fff; font-size: 1rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }

        .result-display { 
            margin-top: 10px; padding: 25px; background: var(--accent-color); 
            color: white; border-radius: 25px; text-align: center; 
        }
        .result-amount { font-size: 3.5rem; letter-spacing: -1px; }

        @media (max-width: 800px) { .main-content { grid-template-columns: 1fr; } #clock { font-size: 4.5rem; } }
    </style>
</head>
<body oncontextmenu="return false">

    <header>
        <div class="user-info">IP: <span id="user-ip">확인 중...</span></div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <section class="clock-section">
        <div id="clock-wrapper">
            <span id="ampm">오전</span>
            <div id="clock">
                <span id="time-hm" class="time-main">00:00:</span>
                <span id="seconds">00</span>
            </div>
        </div>
        <div id="date">오늘 날짜</div>
    </section>

    <main class="main-content">
        <div class="card">
            <div class="update-area">
                <span class="update-time" id="last-update">방금 전</span>
                <button class="refresh-btn" onclick="manualRefresh()" id="refresh-icon">🔄</button>
            </div>
            <h2>📍 실시간 날씨 (Windy 기반)</h2>
            <div class="weather-info">
                <div><span>현재 위치</span><span id="location" style="text-align: right; opacity: 0.8; font-weight: bold;">탐색 중...</span></div>
                <div><span>🌡️ 온도/습도</span><span><span id="temp">--</span>°C / <span id="humidity">--</span>%</span></div>
                <div style="color: #00c7be;"><span>🌱 이슬점</span><span><span id="dewpoint">--</span>°C</span></div>
                <div><span>🌬️ 풍속</span><span><span id="wind">--</span> m/s</span></div>
                <div><span>🌫️ 미세먼지</span><span style="font-weight: bold; color: #34C759;">좋음</span></div>
            </div>
            
            <h2 style="margin-top: 30px; margin-bottom: 10px;">📊 실시간 유가</h2>
            <div class="gas-price-box">
                <div class="gas-item premium">
                    <span class="gas-label">💎 고급휘발유</span>
                    <span class="gas-val text-premium"><span id="price-premium">2,285</span>원</span>
                </div>
                <div class="gas-item gasoline">
                    <span class="gas-label">⛽ 휘발유</span>
                    <span class="gas-val text-gasoline"><span id="price-gas">2,029</span>원</span>
                </div>
                <div class="gas-item diesel">
                    <span class="gas-label">⛽ 경유</span>
                    <span class="gas-val text-diesel"><span id="price-diesel">1,990</span>원</span>
                </div>
            </div>
            <button class="gas-btn-now" onclick="openOilNow()">
                <span>🔍</span> 오일나우 실시간 가격 비교
            </button>
        </div>

        <div class="card">
            <h2>비율 계산기</h2>
            <div class="calc-wrapper">
                <div class="input-group">
                    <label style="opacity: 0.7; margin-bottom: 8px; display: block;">희석 비율 (1 : X)</label>
                    <input type="number" id="ratio" style="width: 100%; box-sizing: border-box; padding: 20px; border: none; border-radius: 22px; background: var(--input-bg); color: var(--text-color); font-size: 1.8rem; text-align: right;" value="50" oninput="calculate()">
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <label style="opacity: 0.7; margin-bottom: 8px; display: block;">물 양 (ml)</label>
                    <input type="number" id="water" style="width: 100%; box-sizing: border-box; padding: 20px; border: none; border-radius: 22px; background: var(--input-bg); color: var(--text-color); font-size: 1.8rem; text-align: right;" value="1000" oninput="calculate()">
                </div>
                <div class="result-display">
                    <div class="result-amount" id="chemOut">20<span>ml</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentCity = "";
        let currentDistrict = "";

        function triggerHaptic() { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(20); }

        function manualRefresh() {
            triggerHaptic();
            const btn = document.getElementById('refresh-icon');
            btn.classList.add('refreshing');
            getIP();
            getLocation();
            setTimeout(() => { btn.classList.remove('refreshing'); }, 800);
        }

        function openOilNow() {
            triggerHaptic();
            if (currentCity) {
                const searchTag = `${currentCity}-${currentDistrict}`.replace(/\s+/g, '');
                const url = `https://www.oilnow.co.kr/gas-station-price-comparison/gasoline/${searchTag}`;
                window.open(url);
            } else {
                window.open('https://www.oilnow.co.kr/gas-station-price-comparison/gasoline/');
            }
        }

        async function getIP() {
            const ipElement = document.getElementById('user-ip');
            try {
                const response = await fetch('https://1.1.1.1/cdn-cgi/trace');
                const data = await response.text();
                const ip = data.split('\n').find(line => line.startsWith('ip=')).split('=')[1];
                ipElement.textContent = ip;
            } catch (e) { ipElement.textContent = "확인 불가"; }
        }
        getIP();

        async function getExtraData(lat, lon) {
            try {
                // Windy와 동일한 ECMWF 모델 기반 데이터를 제공하는 Open-Meteo 사용
                // 정밀도를 위해 전용 파라미터(models=ecmwf_ifs) 추가 가능
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,dew_point_2m&models=ecmwf_ifs&timezone=auto`);
                const wData = await weatherRes.json();
                
                document.getElementById('temp').textContent = Math.round(wData.current.temperature_2m);
                document.getElementById('humidity').textContent = wData.current.relative_humidity_2m;
                document.getElementById('dewpoint').textContent = Math.round(wData.current.dew_point_2m);
                document.getElementById('wind').textContent = (wData.current.wind_speed_10m / 3.6).toFixed(1);

                setUpdateTime();
            } catch (e) { console.error(e); }
        }

        async function getAddress(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1&zoom=18`, {
                    headers: { 'Accept-Language': 'ko' }
                });
                const data = await response.json();
                const addr = data.address;
                currentCity = addr.city || addr.province || addr.town || "";
                currentDistrict = addr.city_district || addr.borough || addr.suburb || addr.county || "";
                document.getElementById('location').textContent = currentDistrict ? `${currentCity} ${currentDistrict}` : currentCity;
                getExtraData(lat, lon);
            } catch (e) { 
                document.getElementById('location').textContent = "현 위치 확인"; 
                getExtraData(lat, lon);
            }
        }

        function getLocation() { 
            if (navigator.geolocation) { 
                navigator.geolocation.getCurrentPosition(
                    (p) => getAddress(p.coords.latitude, p.coords.longitude),
                    (e) => { alert("위치 권한을 허용해주세요!"); },
                    { enableHighAccuracy: true }
                ); 
            } 
        }
        getLocation();

        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const secondsVal = now.getSeconds();
            document.getElementById('ampm').textContent = hours >= 12 ? '오후' : '오전';
            hours = hours % 12 || 12; 
            document.getElementById('time-hm').textContent = `${hours}:${minutes}:`;
            document.getElementById('seconds').textContent = String(secondsVal).padStart(2, '0');
            document.getElementById('date').textContent = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }
        setInterval(updateTime, 1000); updateTime();

        function setUpdateTime() {
            const now = new Date();
            document.getElementById('last-update').textContent = `갱신: ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }

        function toggleTheme() {
            const b = document.body;
            b.hasAttribute('data-theme') ? b.removeAttribute('data-theme') : b.setAttribute('data-theme', 'dark');
            triggerHaptic();
        }

        function calculate() {
            const r = parseFloat(document.getElementById('ratio').value) || 0;
            const w = parseFloat(document.getElementById('water').value) || 0;
            const res = r > 0 && w > 0 ? (w / r).toFixed(1).replace('.0','') : '0';
            document.getElementById('chemOut').innerHTML = res + '<span>ml</span>';
        }
        calculate();
    </script>
</body>
</html>
