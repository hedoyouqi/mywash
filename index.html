<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My</title>
    <style>
        @font-face {
            font-family: 'MyCustomFont';
            src: url('./Aabubble.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        :root {
            --bg-color: #f6f5fa; --card-bg: #ffffff; --text-color: #2d3436;
            --accent-color: #6c5ce7; --input-bg: #f1f0f7;
            --clock-gradient: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
        }

        [data-theme="dark"] {
            --bg-color: #13111f; --card-bg: #1e1b2e; --text-color: #f5f5f7;
            --accent-color: #a29bfe; --input-bg: #2c2c3e;
            --clock-gradient: linear-gradient(135deg, #a29bfe 0%, #ffffff 100%);
        }

        * {
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
            overscroll-behavior-y: contain; -webkit-font-smoothing: antialiased;
            font-family: 'MyCustomFont', -apple-system, sans-serif !important;
            outline: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .ip-display { font-size: 0.85rem; opacity: 0.6; background: var(--input-bg); padding: 5px 15px; border-radius: 15px; }
        .theme-toggle { cursor: pointer; font-size: 1.6rem; background: none; border: none; color: var(--text-color); }
        
        .clock-section { text-align: center; margin-bottom: 50px; margin-top: 20px; }
        #clock-wrapper { display: flex; align-items: baseline; justify-content: center; gap: 12px; }
        #ampm { font-size: 2rem; opacity: 0.4; }
        #clock { font-size: 5.5rem; letter-spacing: -2px; line-height: 1; display: flex; }
        .time-main, #seconds { background: var(--clock-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        #date { font-size: 1.3rem; opacity: 0.5; margin-top: 12px; }

        .menu-container {
            display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 500px;
        }

        .menu-btn {
            position: relative; overflow: hidden;
            background-color: var(--card-bg); padding: 40px 20px; border-radius: 35px;
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.15);
            text-decoration: none; color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }

        .menu-btn:active { transform: scale(0.95); }
        .menu-btn:hover { border-color: var(--accent-color); }

        .menu-btn i { font-size: 2.5rem; margin-bottom: 15px; }
        .menu-btn .title { font-size: 1.4rem; font-weight: 900; color: var(--accent-color); }
        .menu-btn .desc { font-size: 0.85rem; opacity: 0.5; margin-top: 8px; }

        @media (max-width: 500px) { #clock { font-size: 4rem; } }
    </style>
</head>
<body oncontextmenu="return false">

    <header>
        <div class="ip-display">IP: <span id="user-ip">Loading...</span></div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <section class="clock-section">
        <div id="clock-wrapper">
            <span id="ampm">오전</span>
            <div id="clock">
                <span id="time-hm" class="time-main">00:00:</span>
                <span id="seconds">00</span>
            </div>
        </div>
        <div id="date">로딩 중...</div>
    </section>

    <main class="menu-container">
        <a href="weather.html" class="menu-btn">
            <span style="font-size: 3rem;">🌡️</span>
            <div class="title">날씨 & 세차 희석비</div>
            <div class="desc">실시간 기상 정보와 케미컬 가이드</div>
        </a>

        <a href="finance.html" class="menu-btn">
            <span style="font-size: 3rem;">💰</span>
            <div class="title">로또 추천 & 금융 정보</div>
            <div class="desc">실시간 코인/지수 및 행운 번호</div>
        </a>
    </main>

    <script>
        function triggerHaptic() { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(20); }

        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('ampm').textContent = hours >= 12 ? '오후' : '오전';
            hours = hours % 12 || 12;
            document.getElementById('time-hm').textContent = `${hours}:${minutes}:`;
            document.getElementById('seconds').textContent = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('date').textContent = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                document.getElementById('user-ip').textContent = data.ip;
            } catch (e) { document.getElementById('user-ip').textContent = 'Disconnected'; }
        }

        function toggleTheme() {
            triggerHaptic();
            const b = document.body;
            b.hasAttribute('data-theme') ? b.removeAttribute('data-theme') : b.setAttribute('data-theme', 'dark');
        }

        setInterval(updateTime, 1000);
        updateTime();
        getIP();

        window.oncontextmenu = function(e) { e.preventDefault(); return false; };
    </script>
</body>
</html>
