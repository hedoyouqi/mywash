<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세차 대시보드</title>
    <style>
        @font-face {
            font-family: 'MyCustomFont';
            src: url('./Aabubble.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        :root {
            --bg-color: #f0f3f5;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --accent-color: #007aff;
            --input-bg: #f8f9fa;
            --clock-gradient: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0a;
            --card-bg: #1c1c1e;
            --text-color: #f5f5f7;
            --accent-color: #0a84ff;
            --input-bg: #2c2c2e;
            --clock-gradient: linear-gradient(135deg, #ffffff 0%, #d1d1d6 100%);
        }

        * {
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
            overscroll-behavior-y: contain; -webkit-font-smoothing: antialiased;
            font-family: 'MyCustomFont', -apple-system, sans-serif !important;
        }

        input { -webkit-user-select: auto !important; user-select: auto !important; }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-y: auto;
        }

        #pull-to-refresh {
            position: fixed; top: -60px; left: 0; right: 0; height: 60px;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; transition: transform 0.2s ease;
        }

        .spinner {
            width: 22px; height: 22px; border: 2px solid rgba(0, 122, 255, 0.1);
            border-top: 2px solid var(--accent-color); border-radius: 50%;
            animation: spin 0.8s linear infinite; display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        header { width: 100%; max-width: 850px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { font-size: 0.8rem; color: #999; opacity: 0.8; }
        .theme-toggle { cursor: pointer; font-size: 1.6rem; background: none; border: none; color: var(--text-color); padding: 10px; opacity: 0.7; }
        
        .clock-section { text-align: center; margin-bottom: 40px; }
        #clock-wrapper { display: flex; align-items: baseline; justify-content: center; gap: 12px; }
        #ampm { font-size: 2.2rem; opacity: 0.4; }
        #clock { font-size: 6rem; letter-spacing: -2px; line-height: 1; display: flex; }
        .time-main, #seconds { background: var(--clock-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        #date { font-size: 1.4rem; opacity: 0.5; margin-top: 12px; }

        .main-content { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; width: 100%; max-width: 850px; }

        .card { 
            position: relative; background-color: var(--card-bg); 
            padding: 30px; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
        }

        /* ✨ 업데이트 영역 & 버튼 ✨ */
        .update-area {
            position: absolute; top: 30px; right: 25px;
            display: flex; align-items: center; gap: 8px;
        }
        .update-time { font-size: 0.75rem; color: #bbb; }
        .refresh-btn {
            background: none; border: none; font-size: 1.1rem; cursor: pointer;
            color: var(--accent-color); padding: 5px; opacity: 0.8;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
        }
        .refresh-btn:active { transform: scale(0.8) rotate(-45deg); }
        .refreshing { animation: spin 0.8s linear infinite; }

        h2 { margin-top: 0; font-size: 1.3rem; color: var(--accent-color); margin-bottom: 20px; opacity: 0.9; }

        .weather-info div { 
            margin: 15px 0; font-size: 1.2rem; display: flex; 
            justify-content: space-between; border-bottom: 1px solid rgba(128,128,128,0.05); padding-bottom: 12px; 
        }

        .input-group label { font-size: 1.1rem; opacity: 0.7; margin-bottom: 8px; display: block; }
        .input-field { 
            width: 100%; box-sizing: border-box; padding: 20px; 
            border: none; border-radius: 22px; background: var(--input-bg); 
            color: var(--text-color); font-size: 1.8rem; text-align: right; 
        }

        .result-display { 
            margin-top: 10px; padding: 25px; background: var(--accent-color); 
            color: white; border-radius: 25px; text-align: center; 
        }
        .result-amount { font-size: 3.5rem; letter-spacing: -1px; }

        @media (max-width: 800px) { .main-content { grid-template-columns: 1fr; } #clock { font-size: 4.5rem; } }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="pull-to-refresh"><div class="spinner" id="loader"></div></div>

    <header>
        <div class="user-info">IP: <span id="user-ip">...</span></div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <section class="clock-section">
        <div id="clock-wrapper">
            <span id="ampm">오전</span>
            <div id="clock">
                <span id="time-hm" class="time-main">00:00:</span>
                <span id="seconds">00</span>
            </div>
        </div>
        <div id="date">오늘 날짜</div>
    </section>

    <main class="main-content">
        <div class="card">
            <div class="update-area">
                <span class="update-time" id="last-update">방금 전</span>
                <button class="refresh-btn" onclick="manualRefresh()" id="refresh-icon">🔄</button>
            </div>
            <h2>현재 위치 날씨</h2>
            <div class="weather-info">
                <div><span>📍 현재 위치</span><span id="location" style="text-align: right; opacity: 0.8;">탐색 중...</span></div>
                <div><span>🌡️ 온도</span><span id="temp">22</span>°C</div>
                <div><span>💧 습도</span><span id="humidity">45</span>%</div>
                <div><span>🌱 이슬점</span><span id="dewpoint">12</span>°C</div>
            </div>
        </div>

        <div class="card">
            <h2>비율 계산기</h2>
            <div class="calc-wrapper">
                <div class="input-group">
                    <label>희석 비율 (1 : X)</label>
                    <input type="number" id="ratio" class="input-field" value="50" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>물 양 (ml)</label>
                    <input type="number" id="water" class="input-field" value="1000" oninput="calculate()">
                </div>
                <div class="result-display">
                    <div class="result-amount" id="chemOut">20<span>ml</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ✨ 아이폰 햅틱 진동 함수 ✨
        function triggerHaptic() {
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(20); // 짧은 진동
            }
        }

        // 수동 새로고침 버튼 로직
        function manualRefresh() {
            triggerHaptic();
            const btn = document.getElementById('refresh-icon');
            btn.classList.add('refreshing');
            
            // 위치와 IP 다시 가져오기
            getIP();
            getLocation();
            
            setTimeout(() => {
                btn.classList.remove('refreshing');
            }, 800);
        }

        let touchStart = 0;
        document.addEventListener('touchstart', (e) => touchStart = e.targetTouches[0].pageY);
        document.addEventListener('touchmove', (e) => {
            const pullDistance = e.targetTouches[0].pageY - touchStart;
            if (window.scrollY === 0 && pullDistance > 0) {
                document.getElementById('pull-to-refresh').style.transform = `translateY(${Math.min(pullDistance, 80)}px)`;
                document.getElementById('loader').style.display = 'block';
            }
        });
        document.addEventListener('touchend', (e) => {
            if (window.scrollY === 0 && (e.changedTouches[0].pageY - touchStart) > 70) {
                triggerHaptic();
                location.reload();
            } else {
                document.getElementById('pull-to-refresh').style.transform = 'translateY(0)';
                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 200);
            }
        });

        function setUpdateTime() {
            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            document.getElementById('last-update').textContent = `갱신: ${timeStr}`;
        }

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('user-ip').textContent = data.ip;
            } catch (e) { document.getElementById('user-ip').textContent = "Error"; }
        }
        getIP();

        async function getAddress(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1&zoom=18`, {
                    headers: { 'Accept-Language': 'ko' }
                });
                const data = await response.json();
                const addr = data.address;
                const city = addr.city || addr.town || addr.county || "";
                const district = addr.suburb || addr.neighbourhood || addr.city_district || addr.village || addr.township || "";
                document.getElementById('location').textContent = city && district ? `${city} ${district}` : city || district || "위치 탐색 완료";
                setUpdateTime();
            } catch (e) { document.getElementById('location').textContent = "위치 확인 불가"; }
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => getAddress(p.coords.latitude, p.coords.longitude));
            }
        }
        getLocation();

        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const secondsVal = now.getSeconds();
            document.getElementById('ampm').textContent = hours >= 12 ? '오후' : '오전';
            hours = hours % 12 || 12; 
            document.getElementById('time-hm').textContent = `${hours}:${minutes}:`;
            const secElem = document.getElementById('seconds');
            secElem.textContent = String(secondsVal).padStart(2, '0');
            if (secondsVal >= 50) {
                const redness = Math.floor((secondsVal - 49) * 25.5); 
                secElem.style.webkitTextFillColor = `rgb(${redness}, 0, 0)`;
                secElem.style.background = 'none';
            } else {
                secElem.style.webkitTextFillColor = 'transparent';
                secElem.style.background = 'var(--clock-gradient)';
                secElem.style.webkitBackgroundClip = 'text';
            }
            document.getElementById('date').textContent = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }
        setInterval(updateTime, 1000); updateTime();

        function toggleTheme() {
            const b = document.body;
            b.hasAttribute('data-theme') ? b.removeAttribute('data-theme') : b.setAttribute('data-theme', 'dark');
            triggerHaptic();
        }

        function calculate() {
            const r = parseFloat(document.getElementById('ratio').value) || 0;
            const w = parseFloat(document.getElementById('water').value) || 0;
            const res = r > 0 && w > 0 ? (w / r).toFixed(1).replace('.0','') : '0';
            document.getElementById('chemOut').innerHTML = res + '<span>ml</span>';
        }
        calculate();
    </script>
</body>
</html>
