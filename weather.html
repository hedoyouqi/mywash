<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스바라시~</title>
    <style>
        @font-face {
            font-family: 'MyCustomFont';
            src: url('./Aabubble.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        :root {
            --bg-color: #f0f3f5;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --accent-color: #007aff;
            --input-bg: #f8f9fa;
            --clock-gradient: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0a;
            --card-bg: #1c1c1e;
            --text-color: #f5f5f7;
            --accent-color: #0a84ff;
            --input-bg: #2c2c2e;
            --clock-gradient: linear-gradient(135deg, #ffffff 0%, #d1d1d6 100%);
        }

        * {
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
            overscroll-behavior-y: contain; -webkit-font-smoothing: antialiased;
            font-family: 'MyCustomFont', -apple-system, sans-serif !important;
        }

        input { -webkit-user-select: auto !important; user-select: auto !important; }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-y: auto;
        }

        header { width: 100%; max-width: 850px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { font-size: 0.8rem; color: #999; opacity: 0.8; }
        .theme-toggle { cursor: pointer; font-size: 1.6rem; background: none; border: none; color: var(--text-color); padding: 10px; opacity: 0.7; }
        
        .clock-section { text-align: center; margin-bottom: 40px; }
        #clock-wrapper { display: flex; align-items: baseline; justify-content: center; gap: 12px; }
        #ampm { font-size: 2.2rem; opacity: 0.4; }
        #clock { font-size: 6rem; letter-spacing: -2px; line-height: 1; display: flex; }
        .time-main, #seconds { background: var(--clock-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        #date { font-size: 1.4rem; opacity: 0.5; margin-top: 12px; }

        .main-content { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; width: 100%; max-width: 850px; }

        .card { 
            position: relative; background-color: var(--card-bg); 
            padding: 30px; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
        }

        .update-area {
            position: absolute; top: 30px; right: 25px;
            display: flex; align-items: center; gap: 8px;
        }
        .update-time { font-size: 0.75rem; color: #bbb; }
        .refresh-btn {
            background: none; border: none; font-size: 1.1rem; cursor: pointer;
            color: var(--accent-color); padding: 5px; opacity: 0.8;
        }

        h2 { margin-top: 0; font-size: 1.3rem; color: var(--accent-color); margin-bottom: 20px; opacity: 0.9; }

        .weather-status { font-size: 2.5rem; display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .weather-text { font-size: 1.5rem; font-weight: bold; }

        .weather-info div { 
            margin: 15px 0; font-size: 1.2rem; display: flex; 
            justify-content: space-between; border-bottom: 1px solid rgba(128,128,128,0.05); padding-bottom: 12px; 
        }

        .result-display { 
            margin-top: 10px; padding: 25px; background: var(--accent-color); 
            color: white; border-radius: 25px; text-align: center; 
        }
        .result-amount { font-size: 3.5rem; letter-spacing: -1px; }

        @media (max-width: 800px) { .main-content { grid-template-columns: 1fr; } #clock { font-size: 4.5rem; } }
    </style>
</head>
<body oncontextmenu="return false">

    <header>
        <div class="user-info">IP: <span id="user-ip">...</span></div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <section class="clock-section">
        <div id="clock-wrapper">
            <span id="ampm">오전</span>
            <div id="clock">
                <span id="time-hm" class="time-main">00:00:</span>
                <span id="seconds">00</span>
            </div>
        </div>
        <div id="date">오늘 날짜</div>
    </section>

    <main class="main-content">
        <div class="card">
            <div class="update-area">
                <span class="update-time" id="last-update">방금 전</span>
                <button class="refresh-btn" onclick="manualRefresh()">🔄</button>
            </div>
            <h2>📍 실시간 날씨</h2>
            <div class="weather-status">
                <span id="weather-icon">🌡️</span>
                <span class="weather-text" id="weather-desc">로딩 중</span>
            </div>
            <div class="weather-info">
                <div><span>현재 위치</span><span id="location" style="font-weight: bold;">탐색 중</span></div>
                <div><span>🌡️ 온도/습도</span><span><span id="temp">--</span>°C / <span id="humidity">--</span>%</span></div>
                <div style="color: #00c7be;"><span>🌱 이슬점</span><span><span id="dewpoint">--</span>°C</span></div>
                <div><span>🌬️ 풍속</span><span><span id="wind">--</span> m/s</span></div>
                <div><span>🌫️ 미세먼지</span><span style="font-weight: bold; color: #34C759;">좋음</span></div>
            </div>
        </div>

        <div class="card">
            <h2>비율 계산기</h2>
            <div class="calc-wrapper">
                <div class="input-group">
                    <label style="opacity: 0.7; margin-bottom: 8px; display: block;">희석 비율 (1 : X)</label>
                    <input type="number" id="ratio" style="width: 100%; box-sizing: border-box; padding: 20px; border: none; border-radius: 22px; background: var(--input-bg); color: var(--text-color); font-size: 1.8rem; text-align: right;" value="50" oninput="calculate()">
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <label style="opacity: 0.7; margin-bottom: 8px; display: block;">물 양 (ml)</label>
                    <input type="number" id="water" style="width: 100%; box-sizing: border-box; padding: 20px; border: none; border-radius: 22px; background: var(--input-bg); color: var(--text-color); font-size: 1.8rem; text-align: right;" value="1000" oninput="calculate()">
                </div>
                <div class="result-display">
                    <div class="result-amount" id="chemOut">20<span>ml</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const weatherCodes = {
            0: ["☀️", "맑음"], 1: ["🌤️", "대체로 맑음"], 2: ["⛅", "구름 조금"], 3: ["☁️", "흐림"],
            45: ["🌫️", "안개"], 48: ["🌫️", "짙은 안개"], 51: ["🌦️", "약한 이슬비"], 61: ["🌧️", "비"],
            71: ["❄️", "눈"], 95: ["⚡", "천둥번개"]
        };

        async function getWeatherData(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,dew_point_2m,weather_code&timezone=auto`);
                const w = await res.json();
                
                document.getElementById('temp').textContent = Math.round(w.current.temperature_2m);
                document.getElementById('humidity').textContent = w.current.relative_humidity_2m;
                document.getElementById('dewpoint').textContent = Math.round(w.current.dew_point_2m);
                document.getElementById('wind').textContent = (w.current.wind_speed_10m / 3.6).toFixed(1);
                
                const code = w.current.weather_code;
                const status = weatherCodes[code] || ["🌡️", "날씨 정보"];
                document.getElementById('weather-icon').textContent = status[0];
                document.getElementById('weather-desc').textContent = status[1];
                
                document.getElementById('last-update').textContent = `갱신: ${new Date().toLocaleTimeString('ko-KR')}`;
            } catch (e) { }
        }

        async function getAddress(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`, {headers:{'Accept-Language':'ko'}});
                const data = await res.json();
                document.getElementById('location').textContent = data.address.city || data.address.province || "구미시";
            } catch (e) { }
        }

        function manualRefresh() {
            getIP(); getLocation();
        }

        function getLocation() { 
            if (navigator.geolocation) { 
                navigator.geolocation.getCurrentPosition(p => {
                    getAddress(p.coords.latitude, p.coords.longitude);
                    getWeatherData(p.coords.latitude, p.coords.longitude);
                }); 
            } 
        }

        async function getIP() {
            try {
                const res = await fetch('https://1.1.1.1/cdn-cgi/trace');
                const data = await res.text();
                document.getElementById('user-ip').textContent = data.split('\n').find(l => l.startsWith('ip=')).split('=')[1];
            } catch (e) { }
        }

        function updateTime() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('ampm').textContent = h >= 12 ? '오후' : '오전';
            h = h % 12 || 12;
            document.getElementById('time-hm').textContent = `${h}:${m}:`;
            document.getElementById('seconds').textContent = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('date').textContent = now.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'long'});
        }

        function calculate() {
            const r = parseFloat(document.getElementById('ratio').value) || 0;
            const w = parseFloat(document.getElementById('water').value) || 0;
            document.getElementById('chemOut').innerHTML = (r > 0 && w > 0 ? (w / r).toFixed(1).replace('.0','') : '0') + '<span>ml</span>';
        }

        function toggleTheme() {
            document.body.hasAttribute('data-theme') ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
        }

        getIP(); getLocation(); updateTime(); calculate();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
