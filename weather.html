<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스바라시~</title>
    <style>
        @font-face {
            font-family: 'MyCustomFont';
            src: url('./Aabubble.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        :root {
            --bg-color: #f0f3f5;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --accent-color: #007aff;
            --gas-gasoline: #FF9500;
            --input-bg: #f8f9fa;
            --clock-gradient: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0a;
            --card-bg: #1c1c1e;
            --text-color: #f5f5f7;
            --accent-color: #0a84ff;
            --input-bg: #2c2c2e;
            --clock-gradient: linear-gradient(135deg, #ffffff 0%, #d1d1d6 100%);
        }

        * {
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
            overscroll-behavior-y: contain; -webkit-font-smoothing: antialiased;
            font-family: 'MyCustomFont', -apple-system, sans-serif !important;
        }

        input, select { -webkit-user-select: auto !important; user-select: auto !important; }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-y: auto;
        }

        header { width: 100%; max-width: 850px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { font-size: 0.8rem; color: #999; opacity: 0.8; }
        .theme-toggle { cursor: pointer; font-size: 1.6rem; background: none; border: none; color: var(--text-color); padding: 10px; opacity: 0.7; }
        
        .clock-section { text-align: center; margin-bottom: 40px; }
        #clock-wrapper { display: flex; align-items: baseline; justify-content: center; gap: 12px; }
        #ampm { font-size: 2.2rem; opacity: 0.4; }
        #clock { font-size: 6rem; letter-spacing: -2px; line-height: 1; display: flex; }
        .time-main, #seconds { background: var(--clock-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        #date { font-size: 1.4rem; opacity: 0.5; margin-top: 12px; }

        .main-content { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; width: 100%; max-width: 850px; }

        .card { 
            position: relative; background-color: var(--card-bg); 
            padding: 30px; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
        }

        .update-area {
            position: absolute; top: 30px; right: 25px;
            display: flex; align-items: center; gap: 8px;
        }
        .update-time { font-size: 0.75rem; color: #bbb; }
        .refresh-btn {
            background: none; border: none; font-size: 1.1rem; cursor: pointer;
            color: var(--accent-color); padding: 5px; opacity: 0.8;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
        }
        .refreshing { animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h2 { margin-top: 0; font-size: 1.3rem; color: var(--accent-color); margin-bottom: 20px; opacity: 0.9; }

        .weather-info div { 
            margin: 15px 0; font-size: 1.2rem; display: flex; 
            justify-content: space-between; border-bottom: 1px solid rgba(128,128,128,0.05); padding-bottom: 12px; 
        }

        .gas-select-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .select-custom {
            flex: 1; padding: 15px; border-radius: 18px; border: none;
            background: var(--input-bg); color: var(--text-color); font-size: 0.95rem;
            outline: none; cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
        }

        .gas-price-box { display: flex; flex-direction: column; gap: 12px; margin-top: 5px; }
        .gas-item {
            display: flex; flex-direction: column; gap: 6px;
            padding: 16px 20px; border-radius: 22px; background: var(--input-bg);
            border-left: 6px solid var(--gas-gasoline);
        }
        .gas-meta { display: flex; justify-content: space-between; align-items: baseline; }
        .gas-label { font-size: 0.8rem; opacity: 0.5; display: block; margin-top: 2px; }
        .gas-name { font-weight: bold; font-size: 1.05rem; color: var(--text-color); }
        .gas-val { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; color: var(--gas-gasoline); }

        .gas-btn-now {
            width: 100%; margin-top: 15px; padding: 18px; border-radius: 20px; border: none;
            background: #222; color: #fff; font-size: 1rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }

        .result-display { 
            margin-top: 10px; padding: 25px; background: var(--accent-color); 
            color: white; border-radius: 25px; text-align: center; 
        }
        .result-amount { font-size: 3.5rem; letter-spacing: -1px; }

        @media (max-width: 800px) { .main-content { grid-template-columns: 1fr; } #clock { font-size: 4.5rem; } }
    </style>
</head>
<body oncontextmenu="return false">

    <header>
        <div class="user-info">IP: <span id="user-ip">확인 중...</span></div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <section class="clock-section">
        <div id="clock-wrapper">
            <span id="ampm">오전</span>
            <div id="clock">
                <span id="time-hm" class="time-main">00:00:</span>
                <span id="seconds">00</span>
            </div>
        </div>
        <div id="date">오늘 날짜</div>
    </section>

    <main class="main-content">
        <div class="card">
            <div class="update-area">
                <span class="update-time" id="last-update">방금 전</span>
                <button class="refresh-btn" onclick="manualRefresh()" id="refresh-icon">🔄</button>
            </div>
            <h2>📍 실시간 날씨 </h2>
            <div class="weather-info">
                <div><span>현재 위치</span><span id="location" style="text-align: right; opacity: 0.8; font-weight: bold;">탐색 중...</span></div>
                <div><span>🌡️ 온도/습도</span><span><span id="temp">--</span>°C / <span id="humidity">--</span>%</span></div>
                <div style="color: #00c7be;"><span>🌱 이슬점</span><span><span id="dewpoint">--</span>°C</span></div>
                <div><span>🌬️ 풍속</span><span><span id="wind">--</span> m/s</span></div>
                <div><span>🌫️ 미세먼지</span><span style="font-weight: bold; color: #34C759;">좋음</span></div>
            </div>
            
            <h2 style="margin-top: 30px; margin-bottom: 10px;">📊 주변 휘발유 최저가</h2>
            
            <div class="gas-select-row">
                <select id="sido" class="select-custom" onchange="loadSigungu()">
                    <option value="">시/도 선택</option>
                    <option value="01">서울</option><option value="02">경기</option>
                    <option value="03">강원</option><option value="04">충북</option>
                    <option value="05">충남</option><option value="06">전북</option>
                    <option value="07">전남</option><option value="08">경북</option>
                    <option value="09">경남</option><option value="10">제주</option>
                    <option value="11">부산</option><option value="12">대구</option>
                    <option value="13">인천</option><option value="14">광주</option>
                    <option value="15">대전</option><option value="16">울산</option>
                    <option value="17">세종</option>
                </select>
                <select id="sigungu" class="select-custom" onchange="fetchGasPrices()">
                    <option value="">시/군/구</option>
                </select>
            </div>

            <div class="gas-price-box" id="gas-list">
                <div class="gas-item"><span class="gas-label">지역을 선택해 주세요.</span></div>
            </div>

            <button class="gas-btn-now" onclick="openOilNow()">
                <span>🔍</span> 오일나우 실시간 가격 비교
            </button>
        </div>

        <div class="card">
            <h2>비율 계산기</h2>
            <div class="calc-wrapper">
                <div class="input-group">
                    <label style="opacity: 0.7; margin-bottom: 8px; display: block;">희석 비율 (1 : X)</label>
                    <input type="number" id="ratio" style="width: 100%; box-sizing: border-box; padding: 20px; border: none; border-radius: 22px; background: var(--input-bg); color: var(--text-color); font-size: 1.8rem; text-align: right;" value="50" oninput="calculate()">
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <label style="opacity: 0.7; margin-bottom: 8px; display: block;">물 양 (ml)</label>
                    <input type="number" id="water" style="width: 100%; box-sizing: border-box; padding: 20px; border: none; border-radius: 22px; background: var(--input-bg); color: var(--text-color); font-size: 1.8rem; text-align: right;" value="1000" oninput="calculate()">
                </div>
                <div class="result-display">
                    <div class="result-amount" id="chemOut">20<span>ml</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 오피넷 API 연동 로직 (allorigins 프록시 적용) ---
        const OPINET_KEY = 'b240414745'; 
        const PROXY_BASE = 'https://api.allorigins.win/get?url=';

        async function loadSigungu() {
            const sido = document.getElementById('sido').value;
            const sigunguSelect = document.getElementById('sigungu');
            sigunguSelect.innerHTML = '<option value="">불러오는 중...</option>';
            
            if(!sido) { sigunguSelect.innerHTML = '<option value="">시/군/구</option>'; return; }

            const targetUrl = `http://www.opinet.co.kr/api/areaCode.do?code=${OPINET_KEY}&area=${sido}&out=json`;
            
            try {
                const res = await fetch(`${PROXY_BASE}${encodeURIComponent(targetUrl)}`);
                const json = await res.json();
                const data = JSON.parse(json.contents);

                let html = '<option value="">시/군/구 선택</option>';
                data.RESULT.AREA.forEach(a => {
                    html += `<option value="${a.AREA_CD}">${a.AREA_NM}</option>`;
                });
                sigunguSelect.innerHTML = html;
            } catch (e) { 
                console.error(e);
                sigunguSelect.innerHTML = '<option value="">데이터 오류</option>'; 
            }
        }

        async function fetchGasPrices() {
            const area = document.getElementById('sigungu').value;
            if(!area) return;
            const listDiv = document.getElementById('gas-list');
            listDiv.innerHTML = '<div class="gas-item"><span class="gas-label">최저가 검색 중...</span></div>';

            const targetUrl = `http://www.opinet.co.kr/api/lowTop10.do?code=${OPINET_KEY}&area=${area}&prodcd=B027&out=json`;

            try {
                const res = await fetch(`${PROXY_BASE}${encodeURIComponent(targetUrl)}`);
                const json = await res.json();
                const data = JSON.parse(json.contents);
                const items = data.RESULT.OIL.slice(0, 3);

                listDiv.innerHTML = items.map((o, i) => `
                    <div class="gas-item" style="border-left-color: ${i===0 ? '#FFD700' : 'var(--gas-gasoline)'}">
                        <div class="gas-meta">
                            <span class="gas-name">${o.OS_NM}</span>
                            <span class="gas-val">${parseInt(o.PRICE).toLocaleString()}원</span>
                        </div>
                        <span class="gas-label">${o.VAN_ADR}</span>
                    </div>
                `).join('');
            } catch (e) {
                listDiv.innerHTML = '<div class="gas-item"><span class="gas-label" style="color:red;">정보를 불러올 수 없습니다.</span></div>';
            }
        }

        // --- 공통 기능 ---
        let currentCity = ""; let currentDistrict = "";
        function triggerHaptic() { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(20); }

        function manualRefresh() {
            triggerHaptic();
            document.getElementById('refresh-icon').classList.add('refreshing');
            getIP(); getLocation();
            setTimeout(() => { document.getElementById('refresh-icon').classList.remove('refreshing'); }, 800);
        }

        function openOilNow() {
            triggerHaptic();
            const searchTag = currentCity ? `${currentCity}-${currentDistrict}`.replace(/\s+/g, '') : '';
            window.open(`https://www.oilnow.co.kr/gas-station-price-comparison/gasoline/${searchTag}`);
        }

        async function getIP() {
            try {
                const res = await fetch('https://1.1.1.1/cdn-cgi/trace');
                const data = await res.text();
                document.getElementById('user-ip').textContent = data.split('\n').find(l => l.startsWith('ip=')).split('=')[1];
            } catch (e) { document.getElementById('user-ip').textContent = "확인 불가"; }
        }
        getIP();

        async function getAddress(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`, {headers:{'Accept-Language':'ko'}});
                const data = await res.json();
                currentCity = data.address.city || data.address.province || "";
                currentDistrict = data.address.city_district || data.address.borough || "";
                document.getElementById('location').textContent = currentDistrict ? `${currentCity} ${currentDistrict}` : currentCity;
                
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,dew_point_2m&timezone=auto`);
                const w = await weatherRes.json();
                document.getElementById('temp').textContent = Math.round(w.current.temperature_2m);
                document.getElementById('humidity').textContent = w.current.relative_humidity_2m;
                document.getElementById('dewpoint').textContent = Math.round(w.current.dew_point_2m);
                document.getElementById('wind').textContent = (w.current.wind_speed_10m / 3.6).toFixed(1);
                document.getElementById('last-update').textContent = `갱신: ${new Date().toLocaleTimeString('ko-KR')}`;
            } catch (e) { document.getElementById('location').textContent = "위치 확인 실패"; }
        }

        function getLocation() { 
            if (navigator.geolocation) { 
                navigator.geolocation.getCurrentPosition(p => getAddress(p.coords.latitude, p.coords.longitude)); 
            } 
        }
        getLocation();

        function updateTime() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('ampm').textContent = h >= 12 ? '오후' : '오전';
            h = h % 12 || 12;
            document.getElementById('time-hm').textContent = `${h}:${m}:`;
            document.getElementById('seconds').textContent = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('date').textContent = now.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'long'});
        }
        setInterval(updateTime, 1000); updateTime();

        function toggleTheme() {
            document.body.hasAttribute('data-theme') ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
            triggerHaptic();
        }

        function calculate() {
            const r = parseFloat(document.getElementById('ratio').value) || 0;
            const w = parseFloat(document.getElementById('water').value) || 0;
            document.getElementById('chemOut').innerHTML = (r > 0 && w > 0 ? (w / r).toFixed(1).replace('.0','') : '0') + '<span>ml</span>';
        }
        calculate();
    </script>
</body>
</html>
